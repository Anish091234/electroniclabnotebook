name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:rules:types
      - run: npm audit --omit=dev --audit-level=high

      - run: npm ci
        working-directory: functions
      - run: npm run lint
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - run: npm audit --omit=dev --audit-level=high
        working-directory: functions

      - run: npm run test:rules
